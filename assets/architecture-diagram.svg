<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5FD3FF"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#0D1117"/>

  <!-- Frontend box -->
  <rect x="30" y="60" width="200" height="80" rx="8" fill="#161B22" stroke="#5FD3FF" stroke-width="2"/>
  <text x="130" y="95" fill="#F0F6FC" font-family="Fira Code, monospace" font-size="16" text-anchor="middle" font-weight="bold">Frontend</text>
  <text x="130" y="118" fill="#8B949E" font-family="Fira Code, monospace" font-size="13" text-anchor="middle">HTML / CSS / JS</text>

  <!-- Backend box -->
  <rect x="350" y="60" width="220" height="80" rx="8" fill="#161B22" stroke="#5FD3FF" stroke-width="2"/>
  <text x="460" y="92" fill="#F0F6FC" font-family="Fira Code, monospace" font-size="16" text-anchor="middle" font-weight="bold">Backend</text>
  <text x="460" y="114" fill="#8B949E" font-family="Fira Code, monospace" font-size="13" text-anchor="middle">C++ / Crow Framework</text>

  <!-- REST/JSON arrows -->
  <line x1="230" y1="90" x2="348" y2="90" stroke="#5FD3FF" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="348" y1="115" x2="230" y2="115" stroke="#5FD3FF" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="289" y="78" fill="#FFB454" font-family="Fira Code, monospace" font-size="12" text-anchor="middle">REST / JSON</text>

  <!-- vertical line down from backend -->
  <line x1="460" y1="140" x2="460" y2="220" stroke="#5FD3FF" stroke-width="2"/>

  <!-- horizontal distribution line -->
  <line x1="160" y1="220" x2="760" y2="220" stroke="#5FD3FF" stroke-width="2"/>

  <!-- vertical connectors to each service -->
  <line x1="160" y1="220" x2="160" y2="260" stroke="#5FD3FF" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="220" x2="460" y2="260" stroke="#5FD3FF" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="220" x2="760" y2="260" stroke="#5FD3FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Serper box -->
  <rect x="50" y="270" width="220" height="80" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <text x="160" y="302" fill="#F0F6FC" font-family="Fira Code, monospace" font-size="15" text-anchor="middle" font-weight="bold">Serper.dev API</text>
  <text x="160" y="324" fill="#8B949E" font-family="Fira Code, monospace" font-size="12" text-anchor="middle">(web search)</text>

  <!-- Gemini box -->
  <rect x="350" y="270" width="220" height="80" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <text x="460" y="302" fill="#F0F6FC" font-family="Fira Code, monospace" font-size="15" text-anchor="middle" font-weight="bold">Google Gemini API</text>
  <text x="460" y="324" fill="#8B949E" font-family="Fira Code, monospace" font-size="12" text-anchor="middle">(AI summary)</text>

  <!-- SQLite box -->
  <rect x="650" y="270" width="200" height="80" rx="8" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
  <text x="750" y="302" fill="#F0F6FC" font-family="Fira Code, monospace" font-size="15" text-anchor="middle" font-weight="bold">SQLite</text>
  <text x="750" y="324" fill="#8B949E" font-family="Fira Code, monospace" font-size="12" text-anchor="middle">(history / bookmarks)</text>
</svg>
